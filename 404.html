    .e404__title {

      animation: fadeUp .7s var(--ease-out) .55s both;

    .e404__sub {
      font-size: 1rem;

      justify-content: center;
      opacity: 0;
      animation: fadeUp .7s var(--ease-out) .9s both;
    }
    .e404__links a {
      font-size: .875rem;
      color: var(--green);
      font-weight: 500;
      transition: opacity .2s;
    }
    .e404__links a:hover { opacity: .7; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      .e404__leaf, .e404__code, .e404__title, .e404__sub, .e404__actions, .e404__links {
